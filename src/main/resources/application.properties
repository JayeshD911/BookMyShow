spring.application.name=BookMyShow
# Load an optional local secrets file from the project root (ignored by VCS)
# Create `application-secrets.properties` in the project root to hold sensitive values
spring.config.import=optional:file:./application-secrets.properties

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
