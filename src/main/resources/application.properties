spring.application.name=BookMyShow
# Load an optional local secrets file from the project root (ignored by VCS)
# Create `application-secrets.properties` in the project root to hold sensitive values
spring.config.import=optional:file:./application-secrets.properties

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/BMSgit check-ignore -v application-secrets.properties

# Credentials should not be committed to the repository. Provide them via:
#  - environment variables (DB_USERNAME, DB_PASSWORD), or
#  - an `application-secrets.properties` file in the project root (ignored), or
#  - a CI/CD secret management system.
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
